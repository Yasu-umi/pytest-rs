# Upstream pytest test files that must keep passing under pytest-rs.
# This list only grows; a regression here fails CI.

[files]
"testing/freeze/tests/test_trivial.py" = "passed"
"testing/test_doctest.py" = "passed"
"testing/test_monkeypatch.py" = "passed"
"testing/python/show_fixtures_per_test.py" = "passed"
"testing/test_recwarn.py" = "passed"
"testing/test_stepwise.py" = "passed"
"testing/test_tmpdir.py" = "passed"
"testing/test_warning_types.py" = "passed"
"testing/test_stash.py" = "passed"
"testing/test_nodes.py" = "passed"
"testing/deprecated_test.py" = "passed"
"testing/test_compat.py" = "passed"
"testing/test_scope.py" = "passed"
"testing/test_setuponly.py" = "passed"
"testing/test_setupplan.py" = "passed"
"testing/test_runner_xunit.py" = "passed"
"testing/test_unraisableexception.py" = "passed"
"testing/logging/test_fixture.py" = "passed"
"testing/logging/test_formatter.py" = "passed"
"testing/python/approx.py" = "passed"
"testing/python/raises.py" = "passed"
"testing/test_error_diffs.py" = "passed"

# Files intentionally not run: they test pytest's internal implementation,
# which pytest-rs deliberately does not replicate. Behavior-level coverage
# for the same features comes from the pytester-based tests that do run.
[excluded]
"testing/_py/test_local.py" = "vendored legacy py.path implementation"
"testing/code/test_code.py" = "_pytest._code internals"
"testing/code/test_excinfo.py" = "_pytest._code ExceptionInfo/repr internals"
"testing/code/test_source.py" = "_pytest._code Source internals"
"testing/io/test_pprint.py" = "_pytest._io internals"
"testing/io/test_saferepr.py" = "_pytest._io internals"
"testing/io/test_terminalwriter.py" = "_pytest._io internals"
"testing/io/test_wcwidth.py" = "_pytest._io internals"
"testing/test_argcomplete.py" = "argcomplete shell-completion internals"
"testing/test_assertrewrite.py" = "assertion rewriter internals (pytest-rs uses its own rewriter)"
"testing/test_debugging.py" = "pdb integration not planned for v1"
"testing/test_entry_points.py" = "installed-distribution metadata of real pytest"
"testing/test_findpaths.py" = "rootdir discovery unit tests of internal functions"
"testing/test_legacypath.py" = "legacy py.path API surface"
"testing/test_mark_expression.py" = "-k/-m Expression engine unit tests (pytest-rs evaluates in Rust)"
"testing/test_meta.py" = "packaging integrity checks of the real _pytest package"
"testing/test_parseopt.py" = "argparse wrapper internals"
"testing/test_pathlib.py" = "path/import utility internals"
"testing/test_pluginmanager.py" = "pluggy plugin manager internals (pytest-rs does not use pluggy)"
"testing/test_reports.py" = "report object serialization internals"
