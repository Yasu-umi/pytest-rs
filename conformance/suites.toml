# pytest-django: deferred. Needs Parser.parse_known_args plus full Django
# framework integration (DJANGO_SETTINGS_MODULE handling, db/transactional_db
# fixtures, the django_db marker, transaction/schema management) — a distinct
# framework subsystem, not the custom-collector work.
[httpx]
repo = "https://github.com/encode/httpx"
tag = "0.28.1"
testpaths = ["tests"]
deps = [
    "httpx[brotli,cli,http2]==0.28.1",
    "httpcore==1.0.7",
    "anyio==4.13.0",
    "trio==0.33.0",
    "trustme==1.2.1",
    "chardet==7.4.3",
    "socksio==1.0.0",
    "uvicorn==0.34.3",
    "zstandard==0.23.0",
]
# httpx's own pyproject.toml sets addopts = "-rxXs" (no "f"/"E"), which
# suppresses the "short test summary info" FAILED/ERROR lines the
# known_failures mechanism below matches against. -ra (all outcomes except
# passed) is a superset — CLI flags override ini addopts outright in pytest,
# so this doesn't drop the xfailed/xpassed/skipped reporting httpx's own
# addopts wanted, it just adds failed/error on top.
extra_args = ["-ra"]
category = "real-world"
enabled = true
slow_files = [
    "tests/client/test_client.py",
    "tests/client/test_event_hooks.py",
    "tests/test_main.py",
    "tests/test_utils.py",
]
slow_timeout_multiplier = 5
# chardet 7.4.3 detects CP-1252/ISO-8859-1 differently from when these tests
# were written; real pytest fails the same way. trio timeout test is an httpx
# upstream bug (async generator not closed after timeout).
known_failures = [
    "tests/client/test_client.py::test_client_decode_text_using_autodetect",
    "tests/client/test_client.py::test_client_decode_text_using_explicit_encoding",
    "tests/models/test_responses.py::test_response_no_charset_with_cp_1252_content",
    "tests/models/test_responses.py::test_response_decode_text_using_autodetect",
    "tests/test_decoders.py::test_text_decoder_with_autodetect[asyncio-data2-cp1252]",
    "tests/test_decoders.py::test_text_decoder_with_autodetect[trio-data2-cp1252]",
    "tests/test_timeouts.py::test_write_timeout[trio]",
]

