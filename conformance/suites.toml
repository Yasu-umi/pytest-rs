category = "third-party"
enabled = true

[pytest-snapshot]
repo = "https://github.com/joseph-roitman/pytest-snapshot"
tag = "v0.9.0"
testpaths = ["tests"]
# `py` backs the plugin's node.fspath.dirpath() snapshot-dir resolution.
deps = ["pytest-snapshot==0.9.0", "py==1.11.0"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-icdiff]
repo = "https://github.com/hjwp/pytest-icdiff"
tag = "0.5"
testpaths = ["tests"]
deps = ["pytest-icdiff==0.5", "icdiff==2.0.10", "pprintpp==0.4.0", "py==1.11.0"]
pythonpath = ["."]
category = "third-party"
enabled = true

