#   also deselecting test_fastapi_cli_not_installed (prefix match).
# - test_exception_handler_body_access: body JSON serialized without spaces
#   (`{"numbers":[1,2,3]}`) vs expected `{"numbers": [1, 2, 3]}` --
#   upstream starlette/fastapi version mismatch.
known_failures = [
    "tests/test_tutorial/test_custom_request_and_route/test_tutorial002.py::test_exception_handler_body_access",
]

