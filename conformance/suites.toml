# Upstream test suites used as the conformance target: each library's own
# tests are run, file by file, under pytest-rs. The scoreboard tracks how
# much of upstream we reproduce; expected/<name>.toml pins files that must
# keep passing (CI gate).
#
# `local` points at the submodule under conformance/suites/ (used with --local;
# CI always clones the pinned tag for determinism).

[pytest]
repo = "https://github.com/pytest-dev/pytest"
tag = "9.0.3"
testpaths = ["testing"]
exclude = ["example_scripts"]
local = "conformance/suites/pytest"
deps = ["packaging", "iniconfig", "pluggy", "xmlschema", "setuptools", "pygments", "attrs"]
enabled = true

[pytest-asyncio]
repo = "https://github.com/pytest-dev/pytest-asyncio"
tag = "v1.4.0"
testpaths = ["tests"]
local = "conformance/suites/pytest-asyncio"
deps = ["hypothesis"]
enabled = true

[pytest-mock]
repo = "https://github.com/pytest-dev/pytest-mock"
tag = "v3.15.1"
testpaths = ["tests"]
local = "conformance/suites/pytest-mock"
# These assert the low-verbosity "Use -v to get more diff" hint, which pytest
# (faithfully) suppresses when running_on_ci() is true (CI/BUILD_NUMBER set) so
# CI logs get the full diff. Real pytest+pytest-mock fail these under CI too, so
# they only pass in a non-CI dev run; deselect so the rest of the file gates.
deselect = [
    "tests/test_pytest_mock.py::test_detailed_introspection",
    "tests/test_pytest_mock.py::test_detailed_introspection_async",
]
enabled = true

[pytest-cov]
repo = "https://github.com/pytest-dev/pytest-cov"
tag = "v7.1.0"
testpaths = ["tests"]
local = "conformance/suites/pytest-cov"
deps = ["coverage", "process-tests"]
# One 209-test file: long under full pool load, must not hit the timeout.
slow_files = ["tests/test_pytest_cov.py"]
enabled = true

[pytest-xdist]
repo = "https://github.com/pytest-dev/pytest-xdist"
tag = "v3.8.0"
testpaths = ["testing"]
local = "conformance/suites/pytest-xdist"
deps = ["execnet", "filelock", "py"]
# Asserts real workers' scheduling order; flips under machine load (it
# would otherwise randomly trip the results-drift release gate).
deselect = ["testing/acceptance_test.py::TestLoadScope::test_workqueue_ordered_by_size"]
enabled = true

[pytest-split]
repo = "https://github.com/jerry-git/pytest-split"
tag = "0.9.0"
testpaths = ["tests"]
local = "conformance/suites/pytest-split"
enabled = true

[pytest-benchmark]
repo = "https://github.com/ionelmc/pytest-benchmark"
tag = "v5.1.0"
testpaths = ["tests"]
# Wall-clock-bound calibration tests (warmup budgets of max_time=10s per
# loop level); upstream pytest needs ~3m20s for the file, pytest-rs ~2m40s.
slow_files = ["tests/test_calibration.py"]
enabled = true

[pytest-timeout]
repo = "https://github.com/pytest-dev/pytest-timeout"
tag = "2.4.0"
testpaths = ["test_pytest_timeout.py"]
# The dist install (entry point metadata) drives autoload; the flat-layout
# checkout shadows the import at the same version.
deps = ["pytest-timeout==2.4.0", "pexpect"]
pythonpath = ["."]
# pytester.spawn_pytest (pexpect-driven interactive sessions) is a
# deliberate pytester gap; deselect so the rest gates as all-pass.
deselect = [
    "test_pytest_timeout.py::test_suppresses_timeout_when_debugger_is_entered[pdb-set_trace()]",
    "test_pytest_timeout.py::test_disable_debugger_detection_flag[pdb-set_trace()]",
]
category = "third-party"
enabled = true

[anyio]
repo = "https://github.com/agronholm/anyio"
# 4.13.0+: the re-entrant runner guard wording in pytest-rs-anyio matches
# anyio master as of this tag.
tag = "4.13.0"
testpaths = ["tests"]
# anyio itself is installed as a dep so its pytest11 entry point (the
# upstream anyio plugin's fixtures) autoloads; the src/ checkout shadows
# the import at the same version.
deps = [
    "anyio==4.13.0",
    "trio",
    "hypothesis",
    "psutil",
    "trustme",
    "truststore",
    "uvloop",
    "blockbuster",
]
enabled = true

[pytest-mypy]
repo = "https://github.com/realpython/pytest-mypy"
tag = "v1.0.1"
testpaths = ["tests"]
# Custom collector (pytest_collect_file -> MypyFile/MypyItem). mypy/filelock
# back the checker and its cross-worker lock.
deps = ["pytest-mypy==1.0.1", "mypy", "filelock"]
use_src = false
category = "third-party"
enabled = true

[pytest-ruff]
repo = "https://github.com/businho/pytest-ruff"
tag = "v0.5"
testpaths = ["tests"]
# Custom collector (pytest_collect_file -> RuffFile/RuffItem). ruff provides
# the binary, py backs node.fspath.mtime().
deps = ["pytest-ruff==0.5", "ruff", "py"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-subtests]
repo = "https://github.com/pytest-dev/pytest-subtests"
tag = "v0.14.2"
testpaths = ["tests"]
deps = ["pytest-subtests==0.14.2"]
use_src = false
category = "third-party"
enabled = true

[pytest-metadata]
repo = "https://github.com/pytest-dev/pytest-metadata"
tag = "v2.0.4"
testpaths = ["tests"]
deps = ["pytest-metadata==2.0.4"]
use_src = false
category = "third-party"
enabled = true

[pytest-snapshot]
repo = "https://github.com/joseph-roitman/pytest-snapshot"
tag = "v0.9.0"
testpaths = ["tests"]
# `py` backs the plugin's node.fspath.dirpath() snapshot-dir resolution.
deps = ["pytest-snapshot==0.9.0", "py"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-icdiff]
repo = "https://github.com/hjwp/pytest-icdiff"
tag = "0.5"
testpaths = ["tests"]
deps = ["pytest-icdiff==0.5", "icdiff", "pprintpp", "py"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-socket]
repo = "https://github.com/miketheman/pytest-socket"
tag = "0.7.0"
testpaths = ["tests"]
# pytest-httpbin provides the local-server `httpbin` fixture the restrict-hosts
# tests connect to; starlette/httpx/anyio back the async tests.
deps = [
    "pytest-socket==0.7.0",
    "pytest-httpbin",
    "starlette",
    "httpx",
    "anyio",
]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-order]
repo = "https://github.com/pytest-dev/pytest-order"
tag = "v1.4.0"
testpaths = ["tests"]
deps = ["pytest-order==1.4.0"]
category = "third-party"
enabled = true

[pytest-repeat]
repo = "https://github.com/pytest-dev/pytest-repeat"
tag = "v0.9.4"
testpaths = ["test_repeat.py"]
deps = ["pytest-repeat==0.9.4"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-instafail]
repo = "https://github.com/pytest-dev/pytest-instafail"
tag = "v0.5.0"
testpaths = ["test_instafail.py"]
# Flat layout; installed for the pytest11 entry point, checkout shadows.
deps = ["pytest-instafail==0.5.0"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-env]
repo = "https://github.com/pytest-dev/pytest-env"
tag = "1.6.0"
testpaths = ["tests"]
# Installed for the pytest11 entry point; use_src=false so the dist (with its
# build-generated pytest_env/version.py) is imported, not the version-less
# git checkout's src/.
deps = ["pytest-env==1.6.0"]
use_src = false
category = "third-party"
enabled = true

[pytest-rerunfailures]
repo = "https://github.com/pytest-dev/pytest-rerunfailures"
tag = "9.1.1"
testpaths = ["test_pytest_rerunfailures.py"]
# Flat layout: the checkout root is the import path; the dist is installed
# so its pytest11 entry point autoloads (the checkout shadows the import).
# setuptools<81 still ships pkg_resources, which the test module imports
# (removed in setuptools 81+). The `py` package backs the tests'
# py.path.local temp-file flakiness toggles.
deps = ["pytest-rerunfailures==9.1.1", "setuptools<81", "py"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-randomly]
repo = "https://github.com/pytest-dev/pytest-randomly"
tag = "4.1.0"
testpaths = ["tests"]
# Installed as a dep so its pytest11 entry point autoloads; the src/
# checkout shadows the import at the same version. factory-boy/faker/numpy/
# model-bakery drive the optional reseed-integration tests.
deps = [
    "pytest-randomly==4.1.0",
    "factory-boy",
    "faker",
    "numpy",
    "model-bakery",
]
category = "third-party"
enabled = true

# --- Real-world projects: famous suites that must pass wholesale, as
# --- drop-in evidence (no pytest-rs-specific relationship).

[click]
repo = "https://github.com/pallets/click"
tag = "8.3.1"
testpaths = ["tests"]
category = "real-world"
enabled = true

[jinja]
repo = "https://github.com/pallets/jinja"
tag = "3.1.6"
testpaths = ["tests"]
deps = ["markupsafe", "trio"]
category = "real-world"
enabled = true

[marshmallow]
repo = "https://github.com/marshmallow-code/marshmallow"
tag = "4.1.1"
testpaths = ["tests"]
deps = ["simplejson"]
category = "real-world"
enabled = true

[rich]
repo = "https://github.com/Textualize/rich"
tag = "v14.2.0"
testpaths = ["tests"]
deps = ["markdown-it-py", "pygments", "attrs"]
# Flat package layout: the checkout root is the import path.
pythonpath = ["."]
category = "real-world"
enabled = true

[pytest-bdd]
repo = "https://github.com/pytest-dev/pytest-bdd"
tag = "8.1.0"
testpaths = ["tests"]
deps = ["pytest-bdd==8.1.0", "Mako", "parse", "parse-type", "gherkin-official"]
use_src = false
category = "third-party"
enabled = true

# pytest-django: deferred. Needs Parser.parse_known_args plus full Django
# framework integration (DJANGO_SETTINGS_MODULE handling, db/transactional_db
# fixtures, the django_db marker, transaction/schema management) — a distinct
# framework subsystem, not the custom-collector work.
[pytest-django]
repo = "https://github.com/pytest-dev/pytest-django"
tag = "v4.9.0"
testpaths = ["tests"]
deps = ["pytest-django==4.9.0", "Django"]
pythonpath = ["."]
use_src = false
category = "third-party"
enabled = true
