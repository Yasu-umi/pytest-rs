tag = "0.5"
testpaths = ["tests"]
deps = ["pytest-icdiff==0.5", "icdiff==2.0.10", "pprintpp==0.4.0", "py==1.11.0"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-socket]
repo = "https://github.com/miketheman/pytest-socket"
tag = "0.7.0"
testpaths = ["tests"]
# pytest-httpbin provides the local-server `httpbin` fixture the restrict-hosts
# tests connect to; starlette/httpx/anyio back the async tests.
deps = [
    "pytest-socket==0.7.0",
    "pytest-httpbin==2.1.0",
    "starlette==1.2.1",
    "httpx==0.28.1",
    "anyio==4.13.0",
    "requests==2.32.3",
]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-order]
repo = "https://github.com/pytest-dev/pytest-order"
tag = "v1.4.0"
testpaths = ["tests"]
deps = ["pytest-order==1.4.0", "pytest-mock", "pytest-dependency==0.6.1"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-repeat]
repo = "https://github.com/pytest-dev/pytest-repeat"
tag = "v0.9.4"
testpaths = ["test_repeat.py"]
deps = ["pytest-repeat==0.9.4"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-instafail]
repo = "https://github.com/pytest-dev/pytest-instafail"
tag = "v0.5.0"
testpaths = ["test_instafail.py"]
# Flat layout; installed for the pytest11 entry point, checkout shadows.
deps = ["pytest-instafail==0.5.0", "pexpect==4.9.0"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-env]
repo = "https://github.com/pytest-dev/pytest-env"
tag = "1.6.0"
testpaths = ["tests"]
# Installed for the pytest11 entry point; use_src=false so the dist (with its
# build-generated pytest_env/version.py) is imported, not the version-less
# git checkout's src/.
deps = ["pytest-env==1.6.0"]
use_src = false
category = "third-party"
enabled = true

[pytest-rerunfailures]
repo = "https://github.com/pytest-dev/pytest-rerunfailures"
tag = "9.1.1"
testpaths = ["test_pytest_rerunfailures.py"]
# Flat layout: the checkout root is the import path; the dist is installed
# so its pytest11 entry point autoloads (the checkout shadows the import).
# setuptools<81 still ships pkg_resources, which the test module imports
# (removed in setuptools 81+). The `py` package backs the tests'
# py.path.local temp-file flakiness toggles.
deps = ["pytest-rerunfailures==9.1.1", "setuptools<81", "py==1.11.0"]
pythonpath = ["."]
category = "third-party"
enabled = true
# The --reruns-delay tests monkeypatch time.sleep in the *parent* process and
# assert it was called; that mock is only visible when the nested pytester run
# executes in-process (a subprocess child can't see it). Same accommodation as
# the pytest / asyncio / bdd suites whose pytester tests need in-process runs.
env = { PYTEST_RS_INLINE_INPROCESS = "1" }

[pytest-randomly]
repo = "https://github.com/pytest-dev/pytest-randomly"
tag = "4.1.0"
testpaths = ["tests"]
# Installed as a dep so its pytest11 entry point autoloads; the src/
# checkout shadows the import at the same version. factory-boy/faker/numpy/
# model-bakery drive the optional reseed-integration tests.
deps = [
    "pytest-randomly==4.1.0",
    "factory-boy==3.3.3",
    "faker==40.21.0",
    "numpy==2.4.6",
    "model-bakery==1.23.4",
]
# pytest-randomly's own tests never use the benchmark fixture, but pytest-rs's
# native benchmark plugin always prints its header line — one line more than
# upstream, which shifts every verbose per-test PASSED/FAILED line off by one
# and breaks fnmatch/outlines-index assertions across this suite.
env = { PYTEST_RS_DISABLE_PLUGINS = "benchmark" }
# Upstream's own tox.ini runs this suite with `-p no:randomly` so the outer
# session doesn't dogfood the plugin under test on itself. Without it, the
# outer session's own header print calls pytest_randomly._reseed(), which
# lazily caches its module-level `entrypoint_reseeds` list from the real
# (empty) importlib.metadata.entry_points() lookup before any nested
# pytester run gets a chance to monkeypatch it — permanently short-circuiting
# every later nested run's own entry-point injection for the rest of the
# process (test_entrypoint_injection).
extra_args = ["-p", "no:randomly"]
category = "third-party"
enabled = true

