# Upstream test suites used as the conformance target: each library's own
# tests are run, file by file, under pytest-rs. The scoreboard tracks how
# much of upstream we reproduce; expected/<name>.toml pins files that must
# keep passing (CI gate).
#
# `local` points at the submodule under conformance/suites/ (used with --local;
# CI always clones the pinned tag for determinism).

[pytest]
repo = "https://github.com/pytest-dev/pytest"
tag = "9.0.3"
testpaths = ["testing"]
exclude = ["example_scripts"]
# Mirror pytest's own python_files ini so testing/python/*.py (collect.py,
# fixtures.py, metafunc.py, ...) are measured like upstream collects them.
python_files = ["test_*.py", "*_test.py", "testing/python/*.py"]
local = "conformance/suites/pytest"
deps = ["packaging==26.2", "iniconfig==2.3.0", "pluggy==1.6.0", "xmlschema==4.3.1", "setuptools==82.0.1", "pygments==2.20.0", "attrs==26.1.0", "hypothesis==6.155.1"]
# Files that intermittently time out under full-parallel load; give them the
# 3x slow-file timeout so the scoreboard/CI stay stable.
slow_files = [
  "testing/test_terminal.py",
  "testing/test_doctest.py",
  "testing/test_junitxml.py",
]
enabled = true
# pytester inline_run via the in-process backend: pytest's own tests inspect
# live hook calls (getcalls/getreports/assertoutcome) a subprocess JSON relay
# cannot carry. Net-positive over the subprocess path here; xdist stays on the
# subprocess backend (it nests `-n` runs that don't compose in-process).
env = { PYTEST_RS_INLINE_INPROCESS = "1" }
# pytest-rs uses std::time::Instant instead of _pytest.timing.perf_counter for
# test duration measurement (eliminates ~3 PyO3 calls per timing mark, ~10 µs
# saved per test item).  This means the mock_timing fixture, which patches
# _pytest.timing.perf_counter, has no effect on pytest-rs's clock.
#
# With PYTEST_RS_INLINE_INPROCESS=1 the inner pytester sessions also run the
# pytest-rs engine, so tests that assert exact --durations output via
# mock_timing now fail (the inner session ignores the mock just like the outer
# one).  Without the env var the inner sessions call vanilla pytest.main() and
# the mock still works — which is why these tests pass in a plain `pytest`
# invocation but fail in the conformance runner.
#
# All tests that do NOT check exact mocked durations continue to pass.
# Tests that run fine and fail predictably for a known, permanent reason —
# matched by exact nodeid post-hoc (see runner.py's known_failures), so they
# can't collaterally exclude a same-prefix sibling the way deselect would.
known_failures = [
    # TestDurations: assert exact duration values produced by mock_timing,
    # which has no effect on pytest-rs's std::time::Instant-based clock (a
    # deliberate perf tradeoff, not a bug) — see the comment above.
    "testing/acceptance_test.py::TestDurations::test_calls",
    "testing/acceptance_test.py::TestDurations::test_calls_showall",
    "testing/acceptance_test.py::TestDurations::test_calls_showall_durationsmin",
    "testing/acceptance_test.py::TestDurations::test_calls_showall_durationsmin_verbose",
    "testing/acceptance_test.py::TestDurations::test_with_deselected",
    # TestDurationsWithFixture: same mock_timing dependency
    "testing/acceptance_test.py::TestDurationsWithFixture::test_setup_function",
    # tmp_path/tmp_path_factory are reimplemented in pytest/_tmp_path.py
    # (pytest-rs's own module tree), not physically defined in the
    # _pytest/tmpdir.py compat shim (a thin re-export, like every other
    # builtin fixture's _pytest/*.py shim). --fixtures honestly reports each
    # fixture's real source file, so it shows .../pytest/_tmp_path.py instead
    # of upstream's .../_pytest/tmpdir.py — everything else (name, scope,
    # docstring) matches exactly. Matching the literal upstream path would
    # mean physically relocating the fixture functions, inconsistent with
    # every other builtin fixture's shim direction; not worth it for a
    # cosmetic path string. See MCP test_show_fixtures_tmpdir_path_ceiling.
    "testing/python/fixtures.py::TestShowFixtures::test_show_fixtures",
    "testing/python/fixtures.py::TestShowFixtures::test_show_fixtures_verbose",
]

[pytest-asyncio]
repo = "https://github.com/pytest-dev/pytest-asyncio"
tag = "v1.4.0"
testpaths = ["tests"]
local = "conformance/suites/pytest-asyncio"
deps = ["hypothesis==6.155.1"]
enabled = true

[pytest-aiohttp]
repo = "https://github.com/aio-libs/pytest-aiohttp"
tag = "v1.1.1"
testpaths = ["tests"]
# pytest-aiohttp is installed as a dep so its pytest11 entry point autoloads;
# aiohttp is its runtime dependency.
deps = ["pytest-aiohttp==1.1.1", "aiohttp==3.11.18"]
# asyncio legacy mode is not implemented; the test invokes --asyncio-mode=legacy
# which causes an unrecognised-option error, producing no summary line.
known_failures = ["tests/test_switch_mode.py::test_warning_for_legacy_mode"]
category = "third-party"
enabled = true

[pytest-mock]
repo = "https://github.com/pytest-dev/pytest-mock"
tag = "v3.15.1"
testpaths = ["tests"]
local = "conformance/suites/pytest-mock"
# These assert the low-verbosity "Use -v to get more diff" hint, which pytest
# (faithfully) suppresses when running_on_ci() is true (CI/BUILD_NUMBER set) so
# CI logs get the full diff. Real pytest+pytest-mock fail these under CI too —
# known_failures rather than deselect since they actually pass in a non-CI
# dev run (CI env vars unset), so this self-corrects per environment instead
# of always hiding them.
known_failures = [
    "tests/test_pytest_mock.py::test_detailed_introspection",
    "tests/test_pytest_mock.py::test_detailed_introspection_async",
]
enabled = true

[pytest-cov]
repo = "https://github.com/pytest-dev/pytest-cov"
tag = "v7.1.0"
testpaths = ["tests"]
local = "conformance/suites/pytest-cov"
deps = ["coverage==7.14.1", "process-tests==3.0.0"]
# One 209-test file: long under full pool load, must not hit the timeout.
slow_files = ["tests/test_pytest_cov.py"]
enabled = true

[pytest-xdist]
repo = "https://github.com/pytest-dev/pytest-xdist"
tag = "v3.8.0"
testpaths = ["testing"]
local = "conformance/suites/pytest-xdist"
deps = ["execnet==2.1.2", "filelock==3.29.1", "py==1.11.0"]
# pytest-rs always loads the native benchmark plugin, which (like real
# pytest-benchmark) warns to stderr whenever `-n` is active. This suite's own
# tests spin up nested `-n` pytester runs and assert exact stdout/stderr, so
# that warning would leak into them — but a real environment testing xdist
# wouldn't have pytest-benchmark installed at all. Disable it here (env, not
# extra_args, so it reaches the nested subprocess runs, which strip
# PYTEST_ADDOPTS and don't inherit the outer CLI's args). See
# conformance-native-plugin-isolation.
env = { PYTEST_RS_DISABLE_PLUGINS = "benchmark" }
# acceptance_test.py spins up real worker subprocesses for ~100 tests; near
# the default timeout it sometimes runs only part of the file, drifting the
# scoreboard run-to-run (which trips the release's no-drift gate).
slow_files = ["testing/acceptance_test.py"]
enabled = true

[pytest-split]
repo = "https://github.com/jerry-git/pytest-split"
tag = "0.9.0"
testpaths = ["tests"]
local = "conformance/suites/pytest-split"
enabled = true
# pyproject.toml's own addopts set `--cov pytest_split --cov tests` purely
# for the upstream project's own CI coverage dashboard — none of its tests
# assert on coverage output, so pytest-cov is not actually under test here.
# `[tool.coverage.report] fail_under = 90` is sized for one whole-suite pytest
# session; the runner scores file by file, so any single file's coverage of
# the whole package never reaches 90%. Rather than special-case that one
# option, disable the native cov plugin outright for this suite — it isn't
# what pytest-split's conformance is validating.
extra_args = ["-p", "no:pytest_cov"]

[pytest-benchmark]
repo = "https://github.com/ionelmc/pytest-benchmark"
tag = "v5.1.0"
testpaths = ["tests"]
# benchmark_weave (aspect-oriented monkeypatching) needs the optional
# aspectlib extra; without it test_with_testcase.py::test_foo2 errors on
# `import aspectlib`.
deps = ["aspectlib==2.0.0"]
# Wall-clock-bound calibration tests (warmup budgets of max_time=10s per
# loop level); upstream pytest needs ~3m20s for the file, pytest-rs ~2m40s.
slow_files = ["tests/test_calibration.py"]
enabled = true

[pytest-timeout]
repo = "https://github.com/pytest-dev/pytest-timeout"
tag = "2.4.0"
testpaths = ["test_pytest_timeout.py"]
# The dist install (entry point metadata) drives autoload; the flat-layout
# checkout shadows the import at the same version.
deps = ["pytest-timeout==2.4.0", "pexpect==4.9.0"]
pythonpath = ["."]
category = "third-party"
enabled = true

[anyio]
repo = "https://github.com/agronholm/anyio"
# 4.13.0+: the re-entrant runner guard wording in pytest-rs-anyio matches
# anyio master as of this tag.
tag = "4.13.0"
testpaths = ["tests"]
# anyio itself is installed as a dep so its pytest11 entry point (the
# upstream anyio plugin's fixtures) autoloads; the src/ checkout shadows
# the import at the same version.
deps = [
    "anyio==4.13.0",
    "trio==0.33.0",
    "hypothesis==6.155.2",
    "psutil==7.2.2",
    "trustme==1.2.1",
    "truststore==0.10.4",
    "uvloop==0.22.1",
    "blockbuster==1.5.26",
]
enabled = true

[pytest-mypy]
repo = "https://github.com/realpython/pytest-mypy"
tag = "v1.0.1"
testpaths = ["tests"]
# Custom collector (pytest_collect_file -> MypyFile/MypyItem). mypy/filelock
# back the checker and its cross-worker lock.
deps = ["pytest-mypy==1.0.1", "mypy==2.1.0", "filelock==3.29.1"]
use_src = false
# Each item shells out to mypy (type-checking is slow); the whole file can
# exceed the default timeout and time out wholesale, drifting the scoreboard
# between runs (which trips the release's no-drift gate).
slow_files = ["tests/test_pytest_mypy.py"]
category = "third-party"
enabled = true

[pytest-ruff]
repo = "https://github.com/businho/pytest-ruff"
tag = "v0.5"
testpaths = ["tests"]
# Custom collector (pytest_collect_file -> RuffFile/RuffItem). ruff provides
# the binary, py backs node.fspath.mtime().
deps = ["pytest-ruff==0.5", "ruff==0.15.16", "py==1.11.0"]
pythonpath = ["."]
category = "third-party"
enabled = true

[pytest-subtests]
repo = "https://github.com/pytest-dev/pytest-subtests"
tag = "v0.14.2"
testpaths = ["tests"]
deps = ["pytest-subtests==0.14.2"]
use_src = false
category = "third-party"
enabled = true
env = { "PYTEST_RS_INLINE_INPROCESS" = "1" }

[pytest-metadata]
repo = "https://github.com/pytest-dev/pytest-metadata"
tag = "v2.0.4"
testpaths = ["tests"]
deps = ["pytest-metadata==2.0.4"]
use_src = false
category = "third-party"
