name: release

on:
  push:
    tags: ["v*"]
  # Dry run: builds and smoke-tests the wheels, skips publishing.
  workflow_dispatch:

permissions: {}

jobs:
  check-version:
    name: tag matches pyproject version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: check
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match pyproject version $version"
            exit 1
          fi

  ci-green:
    name: CI passed for the tagged commit
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 20

      - name: wait for the commit's CI run to succeed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Bot commits (the conformance auto-refresh, pushed with
          # GITHUB_TOKEN) never trigger CI; walk back to the nearest
          # ancestor that has a run.
          target=""
          for sha in $(git rev-list -n 10 "$GITHUB_SHA"); do
            count=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow CI \
              --commit "$sha" --json databaseId --jq 'length')
            if [ "$count" != "0" ]; then
              target="$sha"
              break
            fi
            echo "no CI run for $sha; trying its parent"
          done
          if [ -z "$target" ]; then
            echo "no CI run found near $GITHUB_SHA"; exit 1
          fi
          # The tag usually lands while that run is still going; poll
          # until it concludes (up to ~30 min).
          for _ in $(seq 60); do
            json=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow CI \
              --commit "$target" --json status,conclusion --limit 1)
            status=$(echo "$json" | python3 -c "import json,sys; runs=json.load(sys.stdin); print(runs[0]['status'] if runs else 'missing')")
            conclusion=$(echo "$json" | python3 -c "import json,sys; runs=json.load(sys.stdin); print(runs[0]['conclusion'] if runs else '')")
            if [ "$status" = "completed" ]; then
              [ "$conclusion" = "success" ] && exit 0
              echo "CI for $target concluded: $conclusion"; exit 1
            fi
            echo "CI for $target is $status; waiting..."
            sleep 30
          done
          echo "timed out waiting for CI"; exit 1

  conformance-clean:
    name: conformance gate (expected pins)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: py3.13

      - name: build
        run: cargo build

      - name: conformance (expected pins must pass)
        run: |
          export LD_LIBRARY_PATH="$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))'):${LD_LIBRARY_PATH:-}"
          python conformance/runner.py --check
          # Gate on the expected/*.toml pins only — the real no-regression
          # guarantee. We do NOT diff the regenerated scoreboard/RESULTS here:
          # a few suites are legitimately nondeterministic run-to-run (e.g.
          # pytest-xdist's acceptance_test.py worker-scheduling tests land
          # 89–91/98), so an exact-match gate would block releases on dashboard
          # noise, not on real regressions. The scoreboard is refreshed and
          # committed by the main-branch CI run, not gated here.

  wheels:
    name: wheel ${{ matrix.platform.name }} py${{ matrix.python-version }}
    needs: check-version
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
        platform:
          - { name: linux-x86_64, runner: ubuntu-latest, manylinux: "2_28" }
          - { name: linux-aarch64, runner: ubuntu-24.04-arm, manylinux: "2_28" }
          - { name: macos-aarch64, runner: macos-latest, manylinux: auto }
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The macos runner's system rustc lags behind the workspace's
      # rust-version (container builds bring their own toolchain).
      - uses: dtolnay/rust-toolchain@stable

      # Both platforms link a python-build-standalone CPython so the
      # recorded libpython reference has the plain libpython3.X leaf name.
      # The manylinux images ship no libpython at all, and macOS framework
      # pythons record ".../Python.framework/Versions/3.X/Python" — a leaf
      # the launcher's (DY)LD_LIBRARY_PATH lookup can never match.
      - name: link python (macos host)
        if: startsWith(matrix.platform.name, 'macos')
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv python install ${{ matrix.python-version }}
          sudo ln -sf "$(uv python find --managed-python ${{ matrix.python-version }})" /usr/local/bin/python-embed

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -o dist -i /usr/local/bin/python-embed
          manylinux: ${{ matrix.platform.manylinux }}
          before-script-linux: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
            uv python install ${{ matrix.python-version }}
            ln -sf "$(uv python find --managed-python ${{ matrix.python-version }})" /usr/local/bin/python-embed

      - name: assert the engine links a plain libpython leaf name
        # Regression gate for the v0.0.1 macos wheels: a framework python
        # records ".../Python.framework/Versions/3.X/Python", whose leaf
        # ("Python") the launcher's loader-path lookup can never resolve.
        run: |
          wheel=$(ls dist/*.whl | head -1)
          unzip -o -q "$wheel" -d /tmp/wheelcheck
          bin=$(find /tmp/wheelcheck -name pytest-rs-bin | head -1)
          if [ "$(uname)" = "Darwin" ]; then
            ref=$(otool -L "$bin" | grep -i python | awk '{print $1}' | head -1)
          else
            # "libpython3.13.so.1.0 => not found" is fine here: only the
            # referenced (leaf) name matters, resolution is the launcher's job.
            ref=$(ldd "$bin" 2>/dev/null | grep -i libpython | awk '{print $1}' | head -1)
          fi
          echo "libpython reference: ${ref:-<none>}"
          case "${ref##*/}" in
            libpython3.*) echo ok ;;
            *) echo "engine must reference libpython3.X by leaf name"; exit 1 ;;
          esac

      - uses: astral-sh/setup-uv@v7

      - name: smoke test (install wheel into a fresh venv and run it)
        run: |
          uv venv --python ${{ matrix.python-version }} smokevenv
          uv pip install --python smokevenv/bin/python dist/*.whl
          mkdir smoke && cd smoke
          cat > test_smoke.py <<'EOF'
          import pytest

          @pytest.fixture
          def num():
              return 42

          def test_fixture(num):
              assert num == 42

          @pytest.mark.parametrize("x", [1, 2])
          def test_param(x):
              assert x > 0
          EOF
          ../smokevenv/bin/pytest-rs test_smoke.py

      - uses: actions/upload-artifact@v5
        with:
          name: wheel-${{ matrix.platform.name }}-py${{ matrix.python-version }}
          path: dist/*.whl

  sdist:
    name: sdist
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -o dist

      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: publish to PyPI
    needs: [wheels, sdist, ci-green, conformance-clean]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # PyPI Trusted Publishing (OIDC).
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  github-release:
    name: GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - uses: actions/checkout@v5
        with:
          path: repo

      - name: create release (CHANGELOG section as notes, generated as fallback)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract this tag's section from CHANGELOG.md ("## v0.0.1" until
          # the next "## " heading), dropping the heading itself.
          awk -v tag="$GITHUB_REF_NAME" '
            $0 ~ "^## " tag "([^0-9.]|$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' repo/CHANGELOG.md > notes.md || true
          if [ -s notes.md ]; then
            gh release create "$GITHUB_REF_NAME" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes-file notes.md
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
