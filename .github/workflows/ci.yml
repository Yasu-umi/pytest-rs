name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      # The conformance step auto-commits refreshed linux results on main.
      contents: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The conformance runner installs suite deps via `uv pip install`.
      - uses: astral-sh/setup-uv@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: py${{ matrix.python-version }}

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: build
        run: cargo build

      - name: conformance (upstream test suites)
        # One canonical environment for the committed results: linux on a
        # single python version. Regressions against expected/*.toml fail here.
        if: matrix.python-version == '3.13'
        run: |
          export LD_LIBRARY_PATH="$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))'):${LD_LIBRARY_PATH:-}"
          python conformance/runner.py --check

      - name: commit refreshed conformance results
        # The runner rewrites scoreboard/RESULTS.md/README on every run; on
        # main the bot commits whatever changed (GITHUB_TOKEN pushes do not
        # retrigger workflows).
        if: matrix.python-version == '3.13' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if ! git diff --quiet conformance/scoreboard conformance/RESULTS.md README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add conformance/scoreboard conformance/RESULTS.md README.md
            git commit -m "conformance: refresh linux results"
            git push
          fi

  python-lint:
    name: python lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6

      - name: uv sync
        # Lint only needs the dev group; the project itself is a maturin
        # package whose build needs a Rust toolchain this job doesn't have.
        run: uv sync --no-install-project

      - name: ruff check
        run: uv run --no-sync ruff check crates conformance

      - name: ruff format check
        run: uv run --no-sync ruff format --check crates conformance

      - name: mypy
        # The plugin py/ trees reuse top-level module names (helper.py), so
        # each gets its own invocation (config covers core + conformance).
        run: |
          uv run --no-sync mypy
          for tree in crates/pytest-rs-asyncio crates/pytest-rs-benchmark crates/pytest-rs-cov crates/pytest-rs-mock; do
            uv run --no-sync mypy "$tree/py"
          done
