name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: rust check (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: py3.13

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  build:
    name: build (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: py${{ matrix.python-version }}

      - name: build
        run: cargo build --release

      - name: upload binary
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: pytest-rs-bin
          path: target/release/pytest-rs-bin
          retention-days: 1

  regression-tests:
    name: regression tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v8
        with:
          name: pytest-rs-bin
          path: target/debug

      - name: make binary executable
        run: chmod +x target/debug/pytest-rs-bin

      - name: run regression tests
        run: |
          export LD_LIBRARY_PATH="$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))'):${LD_LIBRARY_PATH:-}"
          python -m unittest discover -s tests -v

  conformance:
    name: conformance (${{ matrix.group }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: pytest
            suites: "pytest"
          - group: plugins
            suites: "pytest-asyncio,pytest-mock,pytest-cov,pytest-xdist,pytest-split,pytest-benchmark,pytest-timeout,pytest-mypy,pytest-ruff,pytest-subtests,pytest-bdd,pytest-metadata,pytest-snapshot,pytest-icdiff,pytest-socket,pytest-order,pytest-repeat,pytest-instafail,pytest-env,pytest-rerunfailures,pytest-randomly,pytest-django,pytest-aiohttp"
          - group: libs-1
            suites: "anyio,click,jinja,marshmallow,rich,more-itertools,packaging"
          - group: libs-2
            suites: "httpx,httpx2,starlette,attrs,werkzeug,fastapi,sqlglot"
            jobs: 1
          - group: libs-3
            suites: "networkx"
          - group: pandas
            suites: "pandas"
          - group: scikit-learn-1
            suites: "scikit-learn-1"
          - group: scikit-learn-2
            suites: "scikit-learn-2"
          - group: scikit-learn-3
            suites: "scikit-learn-3"
          - group: pydantic
            suites: "pydantic"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: actions/download-artifact@v8
        with:
          name: pytest-rs-bin
          path: target/debug

      - name: make binary executable
        run: chmod +x target/debug/pytest-rs-bin

      - name: cache conformance checkouts + deps
        uses: actions/cache@v5
        with:
          path: .tmp/conformance
          # Also keyed on runner.py: it writes console_scripts/interpreter
          # paths into .tmp/conformance/deps/*/bin at install time (e.g. a
          # PATH/env fix), which a stale cache would keep serving unchanged
          # forever since suites.toml's deps list didn't move.
          key: conformance-${{ matrix.group }}-${{ runner.os }}-${{ hashFiles('conformance/suites.toml', 'conformance/runner.py') }}
          restore-keys: |
            conformance-${{ matrix.group }}-${{ runner.os }}-

      - name: run suites
        run: |
          rm -f conformance/scoreboard/linux/*.json
          export LD_LIBRARY_PATH="$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))'):${LD_LIBRARY_PATH:-}"
          export PYTHONUNBUFFERED=1
          python conformance/runner.py --suite "${{ matrix.suites }}" --check --skip-docs ${{ matrix.jobs && format('--jobs {0}', matrix.jobs) || '' }}

      - name: upload scoreboard
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scoreboard-${{ matrix.group }}
          path: conformance/scoreboard/linux/
          retention-days: 1
          overwrite: true

  conformance-finish:
    name: conformance results
    needs: conformance
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: actions/download-artifact@v8
        with:
          name: pytest-rs-bin
          path: target/debug

      - name: make binary executable
        run: chmod +x target/debug/pytest-rs-bin

      - name: download all scoreboards
        uses: actions/download-artifact@v8
        with:
          pattern: scoreboard-*
          path: conformance/scoreboard/linux/
          merge-multiple: true

      - name: regenerate docs
        if: needs.conformance.result != 'cancelled'
        run: |
          export LD_LIBRARY_PATH="$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))'):${LD_LIBRARY_PATH:-}"
          python -c "
          import sys; sys.path.insert(0, 'conformance')
          from runner import load_suites, render_results_doc, update_readme_table, RESULTS_DOC
          all_suites = load_suites(None)
          RESULTS_DOC.write_text(render_results_doc(all_suites))
          update_readme_table(all_suites)
          "

      - name: cache plugin smoke deps
        uses: actions/cache@v5
        with:
          path: .tmp/conformance
          key: plugin-smoke-${{ runner.os }}-${{ hashFiles('conformance/plugin_smoke.py') }}
          restore-keys: |
            plugin-smoke-${{ runner.os }}-

      - name: plugin smoke (sugar/pretty byte-diff, fixture plugins)
        run: |
          export LD_LIBRARY_PATH="$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))'):${LD_LIBRARY_PATH:-}"
          python conformance/plugin_smoke.py

      - name: commit refreshed conformance results
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.conformance.result != 'cancelled'
        run: |
          if ! git diff --quiet conformance/scoreboard conformance/RESULTS.md README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add conformance/scoreboard conformance/RESULTS.md README.md
            git commit -m "conformance: refresh linux results (${GITHUB_SHA::7})"
            for _ in 1 2 3; do
              git push && break
              git pull --rebase -X theirs origin main
            done
          fi

      - name: check all shards passed
        if: needs.conformance.result != 'success'
        run: |
          echo "One or more conformance shards failed"
          exit 1

  python-lint:
    name: python lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0

      - name: uv sync
        run: uv sync --no-install-project

      - name: ruff check
        run: uv run --no-sync ruff check crates conformance tests

      - name: ruff format check
        run: uv run --no-sync ruff format --check crates conformance tests

      - name: mypy
        run: |
          uv run --no-sync mypy
          for tree in crates/pytest-rs-asyncio crates/pytest-rs-anyio crates/pytest-rs-benchmark crates/pytest-rs-cov crates/pytest-rs-mock; do
            uv run --no-sync mypy "$tree/py"
          done
